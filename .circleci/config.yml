version: 2.1

orbs:
  android: circleci/android@3.2.0

jobs:
  ktlint:
    executor:
      name: android/android_docker
      tag: 2026.03.1
    steps:
      - checkout
      - android/restore_gradle_cache
      - run:
          name: Chmod permissions
          command: chmod +x ./gradlew
      - run:
          name: Run Ktlint
          command: ./gradlew ktlintCheck
      - store_artifacts:
          path: app/build/reports/ktlint
          destination: ktlint-reports
      - android/save_gradle_cache
  build:
    executor:
      name: android/android_docker
      tag: 2026.03.1
    steps:
      - checkout
      - android/restore_gradle_cache
      - run:
          name: Chmod permissions
          command: chmod +x ./gradlew
      - run:
          name: Run Build
          command: ./gradlew assembleDebug
      - run:
          name: Run Lint & Tests
          command: ./gradlew lint testDebug
      - run:
          name: Generate Coverage Report (Kover)
          command: ./gradlew :core:koverXmlReport :core:koverVerify
      - android/save_gradle_cache
      - store_artifacts:
          path: app/build/reports
          destination: reports
      - store_artifacts:
          path: core/build/reports/kover
          destination: coverage-reports
      - store_test_results:
          path: app/build/test-results
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: artifact-file
  vulnerability-check:
    executor:
      name: android/android_docker
      tag: 2026.03.1
    steps:
      - checkout
      - android/restore_gradle_cache
      - run:
          name: Chmod permissions
          command: chmod +x ./gradlew
      - run:
          name: OWASP Dependency Check
          command: ./gradlew dependencyCheckAnalyze
          no_output_timeout: 30m
      - store_artifacts:
          path: build/reports/dependency-check
          destination: owasp-reports
      - android/save_gradle_cache

workflows:
  build-and-test:
    jobs:
      - ktlint
      - build:
          requires:
            - ktlint
      - vulnerability-check:
          requires:
            - build
          filters:
            branches:
              only:
                - main