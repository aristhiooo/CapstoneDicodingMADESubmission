version: 2.1

orbs:
  android: circleci/android@2.5.0  # pakai versi terbaru

jobs:
  build-and-test:
    executor:
      name: android/android-docker
      tag: 2024.01.1  # Android image terbaru
    steps:
      - checkout
      - run:
          name: Calculate cache key
          command: |-
            find . -name 'gradlew*' -o -name '*.gradle*' -o -name '*.kts' | \
              sort | xargs cat > /tmp/CIRCLECI_CACHE_KEY
      - restore_cache:
          key: android-v1-{{ checksum "/tmp/CIRCLECI_CACHE_KEY" }}
      - run:
          name: Chmod permissions
          command: chmod +x ./gradlew
      - run:
          name: Download Dependencies
          command: ./gradlew androidDependencies
      - save_cache:
          key: android-v1-{{ checksum "/tmp/CIRCLECI_CACHE_KEY" }}
          paths:
            - ~/.gradle/caches
            - ~/.android/cache
      - run:
          name: Run Build & Test
          command: ./gradlew check
      - store_test_results:
          path: app/build/test-results
      - store_artifacts:
          path: app/build/reports
          destination: reports

workflows:
  build-and-test:
    jobs:
      - build-and-test